project_tagline: "Teach how coding assistants are configured, guided, and operated."

authors:
  - "CoLab"
  - "Jessica Nash"

copyright_year: 2026

sections:
  - slug: foundations
    title: Foundations
    include: true
    lessons:
      - overview
      - separation-test
  - slug: codex
    title: Codex
    include: true
    lessons:
      - config
      - skills
      - subagents
      - security-permissions
      - end-to-end
  - slug: claude-code
    title: Claude Code
    include: true
    lessons:
      - config
      - skills
      - subagents
      - security-permissions
      - end-to-end
  - slug: best-practices
    title: Best Practices
    include: false
    lessons:
      - separation

scaffold_lessons: true
lesson_stub_style: question-driven
include_csv_tables: true

