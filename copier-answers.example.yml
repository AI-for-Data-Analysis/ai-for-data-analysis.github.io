    logo_dark: images/duke-colab-logo-light.svg
  duke:
    css_files:
      - custom.css
    js_files: []
    logo_light: images/duke_wordmark_white_cropped.svg
    logo_dark: images/duke_wordmark_white_cropped.svg
  flamin_hot:
    css_files:
      - custom.css
      - theme-flamin-hot.css
    js_files:
      - theme-flamin-hot.js
    logo_light: images/flamin-hot-tabby-logo.png
    logo_dark: images/flamin-hot-tabby-logo.png

sphinx_theme: pydata_sphinx_theme
